name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: bio-budget
  REGION: europe-west1
  SERVICE_FRONTEND: deciflow-frontend
  SERVICE_BACKEND: deciflow-ai

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_CREDENTIALS }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Build Backend
      run: |
        gcloud builds submit backend \
          --tag gcr.io/$PROJECT_ID/deciflow-ai

    - name: Deploy Backend
      run: |
        gcloud run deploy $SERVICE_BACKEND \
          --image gcr.io/$PROJECT_ID/deciflow-ai \
          --platform managed \
          --region $REGION \
          --allow-unauthenticated \
          --set-env-vars GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}

    - name: Build Frontend
      run: |
        gcloud builds submit frontend \
          --tag gcr.io/$PROJECT_ID/deciflow-frontend

    - name: Deploy Frontend
      run: |
        gcloud run deploy $SERVICE_FRONTEND \
          --image gcr.io/$PROJECT_ID/deciflow-frontend \
          --platform managed \
          --region $REGION \
          --allow-unauthenticated